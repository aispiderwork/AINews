<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI热点资讯监控系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #09090F;
            --color-surface: #12121A;
            --color-border: #1F1F2B;
            --color-highlight: #262633;
            --color-primary: #60A5FA;
            --color-primary-light: #93C5FD;
            --color-success: #22C55E;
            --color-warning: #F59E0B;
            --color-error: #EF4444;
            --color-text-primary: #F9FAFB;
            --color-text-secondary: #9CA3AF;
            --color-text-muted: #4B5563;
            --color-neon-blue: #38BDF8;
            --color-neon-purple: #A78BFA;
            --font-heading: 'Orbitron', system-ui, sans-serif;
            --font-body: 'Exo 2', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --glow-primary: 0 0 20px rgba(96, 165, 250, 0.4),
                            0 0 40px rgba(96, 165, 250, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            line-height: 1.6;
            color: var(--color-text-primary);
            background: var(--color-bg);
            background-image: radial-gradient(at 20% 20%, rgba(96, 165, 250, 0.08) 0px, transparent 50%),
                              radial-gradient(at 80% 80%, rgba(167, 139, 250, 0.08) 0px, transparent 50%);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            border-bottom: 1px solid var(--color-border);
            padding: var(--space-lg) var(--space-xl);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .logo-text {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-neon-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .nav-tabs {
            display: flex;
            gap: var(--space-sm);
            background: var(--color-surface);
            padding: var(--space-xs);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
        }

        .nav-tab {
            padding: var(--space-sm) var(--space-lg);
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .nav-tab:hover {
            color: var(--color-text-primary);
            background: var(--color-highlight);
        }

        .nav-tab.active {
            background: var(--color-primary);
            color: white;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .last-update {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        .refresh-btn {
            padding: var(--space-sm) var(--space-md);
            background: var(--color-highlight);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .refresh-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-xl);
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .platform-tabs {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            border-bottom: 1px solid var(--color-border);
            flex-wrap: wrap;
        }

        .platform-tab {
            padding: var(--space-sm) var(--space-lg);
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            position: relative;
        }

        .platform-tab:hover {
            color: var(--color-text-primary);
            background: var(--color-highlight);
        }

        .platform-tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.5);
        }

        .platform-tab .count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.5rem;
            height: 1.25rem;
            padding: 0 var(--space-xs);
            background: var(--color-highlight);
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: var(--space-xs);
        }

        .platform-tab.active .count {
            background: var(--color-primary);
            color: white;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .news-card {
            display: flex;
            gap: var(--space-md);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--color-primary) 0%, var(--color-neon-purple) 100%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .news-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--glow-primary);
            transform: translateX(4px);
            background: var(--color-highlight);
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-cover {
            width: 160px;
            height: 90px;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, #1e293b, #0f172a);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            overflow: hidden;
        }

        .news-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .news-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .news-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--space-xs);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.4;
        }

        .news-card:hover .news-title {
            color: var(--color-primary-light);
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
            margin-bottom: var(--space-sm);
        }

        .platform-badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .platform-weibo { background: linear-gradient(135deg, #E6162D, #C41230); }
        .platform-bilibili { background: linear-gradient(135deg, #FB7299, #F45489); }
        .platform-xiaohongshu { background: linear-gradient(135deg, #FE2C55, #E31B47); }
        .platform-x { background: linear-gradient(135deg, #000000, #1A1A1A); }
        .platform-facebook { background: linear-gradient(135deg, #1877F2, #0D47A1); }

        .news-time {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        .news-stats {
            display: flex;
            gap: var(--space-md);
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .news-tags {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--color-highlight);
            color: var(--color-text-secondary);
            font-size: 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--color-border);
            transition: all 0.2s ease;
        }

        .monitor-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .metric-card {
            background: linear-gradient(135deg, var(--color-surface), var(--color-bg));
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .metric-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.1), transparent);
            pointer-events: none;
        }

        .metric-value {
            font-family: var(--font-mono);
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--color-primary);
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            position: relative;
            z-index: 1;
            margin-bottom: var(--space-xs);
        }

        .metric-value.success { color: var(--color-success); text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .metric-value.danger { color: var(--color-error); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }

        .metric-label {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: var(--space-xl);
        }

        .monitor-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
        }

        .monitor-section.full-width {
            grid-column: 1 / -1;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--color-border);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .section-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-highlight);
            border-radius: var(--radius-md);
            font-size: 1rem;
        }

        .platform-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-md);
        }

        .platform-status-card {
            background: var(--color-highlight);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            text-align: center;
            transition: all 0.2s ease;
        }

        .platform-status-card.online { border-color: var(--color-success); }
        .platform-status-card.offline { border-color: var(--color-error); }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: var(--space-xs);
        }

        .status-dot.online {
            background: var(--color-success);
            box-shadow: 0 0 10px var(--color-success);
            animation: pulseDot 2s ease-in-out infinite;
        }
        .status-dot.offline {
            background: var(--color-error);
            box-shadow: 0 0 10px var(--color-error);
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .platform-status-name {
            font-weight: 600;
            margin: var(--space-sm) 0;
        }

        .platform-status-meta {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .failure-reasons {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .failure-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }

        .failure-label {
            min-width: 120px;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .failure-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .failure-bar {
            flex: 1;
            height: 12px;
            background: var(--color-highlight);
            border-radius: 9999px;
            overflow: hidden;
        }

        .failure-bar-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.5s ease;
        }

        .failure-count {
            min-width: 50px;
            text-align: right;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .record-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            max-height: 400px;
            overflow-y: auto;
            padding-right: var(--space-sm);
        }

        .record-list::-webkit-scrollbar { width: 6px; }
        .record-list::-webkit-scrollbar-track { background: var(--color-highlight); border-radius: 9999px; }
        .record-list::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 9999px; }

        .record-item {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--color-highlight);
            border-radius: var(--radius-lg);
            border: 1px solid transparent;
            border-left-width: 3px;
            transition: all 0.2s ease;
        }

        .record-item:hover {
            border-color: var(--color-border);
            border-left-width: 3px;
            background: rgba(255, 255, 255, 0.02);
        }

        .record-item.success { border-left-color: var(--color-success); }
        .record-item.error { border-left-color: var(--color-error); }

        .record-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .record-item.success .record-icon {
            background: rgba(34, 197, 94, 0.15);
            color: var(--color-success);
        }

        .record-item.error .record-icon {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-error);
        }

        .record-content {
            flex: 1;
            min-width: 0;
        }

        .record-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--space-xs);
        }

        .record-meta {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        .record-time {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        .record-detail {
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .record-detail.error-detail {
            color: var(--color-error);
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: var(--space-xl);
            color: var(--color-text-secondary);
        }

        .empty {
            text-align: center;
            padding: var(--space-xl);
            color: var(--color-text-muted);
        }

        @media (max-width: 1024px) {
            .monitor-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .header { padding: var(--space-md); }
            .header-content { flex-direction: column; gap: var(--space-md); }
            .logo-text { font-size: 1rem; }
            .main-content { padding: var(--space-md); }
            .news-card { flex-direction: column; }
            .news-cover { width: 100%; height: 180px; }
            .monitor-header { grid-template-columns: 1fr 1fr; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">AI Hot News Monitor</span>
            </div>
            
            <nav class="nav-tabs">
                <button class="nav-tab active" data-page="news">
                    <span>📰</span> 资讯看板
                </button>
                <button class="nav-tab" data-page="monitor">
                    <span>📊</span> 运行监控
                </button>
            </nav>
            
            <div class="header-right">
                <span class="last-update" id="lastUpdate">更新于: --</span>
                <button class="refresh-btn" id="refreshBtn">
                    <span>🔄</span> 刷新
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="page active" id="news-page">
            <div class="platform-tabs" id="platformTabs">
                <button class="platform-tab active" data-platform="all">全部 <span class="count">0</span></button>
                <button class="platform-tab" data-platform="weibo">微博 <span class="count">0</span></button>
                <button class="platform-tab" data-platform="bilibili">哔哩哔哩 <span class="count">0</span></button>
                <button class="platform-tab" data-platform="xiaohongshu">小红书 <span class="count">0</span></button>
                <button class="platform-tab" data-platform="x">X (Twitter) <span class="count">0</span></button>
                <button class="platform-tab" data-platform="facebook">Facebook <span class="count">0</span></button>
            </div>

            <div class="news-list" id="newsList">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="page" id="monitor-page">
            <div class="monitor-header" id="metricCards">
                <div class="metric-card">
                    <div class="metric-value success">--</div>
                    <div class="metric-label">采集成功率</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value danger">--</div>
                    <div class="metric-label">失败率</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">--</div>
                    <div class="metric-label">平均响应时间</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value success">--</div>
                    <div class="metric-label">封面获取率</div>
                </div>
            </div>

            <div class="monitor-grid">
                <div class="monitor-section">
                    <div class="section-header">
                        <h3 class="section-title">
                            <span class="section-icon">🌐</span>
                            平台状态监控
                        </h3>
                    </div>
                    <div class="platform-status-grid" id="platformStatus">
                    </div>
                </div>

                <div class="monitor-section">
                    <div class="section-header">
                        <h3 class="section-title">
                            <span class="section-icon">📊</span>
                            失败原因统计
                        </h3>
                    </div>
                    <div class="failure-reasons" id="failureReasons">
                    </div>
                </div>

                <div class="monitor-section full-width">
                    <div class="section-header">
                        <h3 class="section-title">
                            <span class="section-icon">📝</span>
                            最近采集记录
                        </h3>
                    </div>
                    <div class="record-list" id="recentExecutions">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let appData = null;
        let currentPlatform = 'all';

        const platformNames = {
            'weibo': '微博',
            'bilibili': '哔哩哔哩',
            'xiaohongshu': '小红书',
            'x': 'X (Twitter)',
            'facebook': 'Facebook'
        };

        const platformEmojis = {
            'weibo': '🔥',
            'bilibili': '🎬',
            'xiaohongshu': '✨',
            'x': '🚀',
            'facebook': '📢'
        };

        async function loadData() {
            try {
                const response = await fetch('data/data.json?' + Date.now());
                if (!response.ok) throw new Error('Failed to load data');
                appData = await response.json();
                renderAll();
            } catch (e) {
                console.error('Error loading data:', e);
                loadDemoData();
            }
        }

        function loadDemoData() {
            appData = {
                update_time: new Date().toISOString(),
                news: {
                    weibo: [
                        { id: '1', title: 'OpenAI 发布 GPT-5 最新进展，多模态能力大幅提升', url: '#', platform: 'weibo', hot_rank: 1, hot_value: 1250000, crawl_time: new Date().toISOString(), metrics: { search_count: '125万' }, tags: ['LLM', 'GPT-5', '多模态'] },
                        { id: '2', title: 'Claude 3.5 新功能体验报告', url: '#', platform: 'weibo', hot_rank: 5, hot_value: 890000, crawl_time: new Date().toISOString(), metrics: { search_count: '89万' }, tags: ['Claude', 'AI'] }
                    ],
                    bilibili: [
                        { id: '3', title: '【干货教程】从零构建 AI Agent 工作流完整实战', url: '#', platform: 'bilibili', hot_rank: 1, hot_value: 450000, crawl_time: new Date().toISOString(), metrics: { play_count: '45.2万' }, tags: ['Agent', '教程'] }
                    ],
                    xiaohongshu: [],
                    x: [],
                    facebook: []
                },
                monitor: {
                    summary: { total_success_rate: 98.5, total_fail_rate: 1.5, avg_response_time: 2.1, cover_success_rate: 87.2 },
                    platforms: [
                        { platform: 'weibo', name: '微博', status: 'online', item_count: 32 },
                        { platform: 'bilibili', name: '哔哩哔哩', status: 'online', item_count: 25 },
                        { platform: 'xiaohongshu', name: '小红书', status: 'online', item_count: 18 },
                        { platform: 'x', name: 'X (Twitter)', status: 'offline', item_count: 7 },
                        { platform: 'facebook', name: 'Facebook', status: 'online', item_count: 5 }
                    ],
                    failure_reasons: { network_timeout: 12, cookie_expired: 8, page_changed: 4, auth_failed: 2, other: 1 },
                    recent_executions: [
                        { id: '1', timestamp: new Date().toISOString(), platform: 'weibo', status: 'success', items_collected: 32, latency: 2.1 },
                        { id: '2', timestamp: new Date(Date.now() - 300000).toISOString(), platform: 'x', status: 'error', error_message: '网络超时' }
                    ]
                }
            };
            renderAll();
        }

        function renderAll() {
            if (!appData) return;
            
            renderUpdateTime();
            renderPlatformCounts();
            renderNewsList();
            renderMonitorDashboard();
        }

        function renderUpdateTime() {
            const updateEl = document.getElementById('lastUpdate');
            if (appData.update_time) {
                const date = new Date(appData.update_time);
                updateEl.textContent = '更新于: ' + date.toLocaleString('zh-CN');
            }
        }

        function renderPlatformCounts() {
            const tabs = document.querySelectorAll('.platform-tab');
            const news = appData.news || {};
            
            tabs.forEach(tab => {
                const platform = tab.dataset.platform;
                let count = 0;
                
                if (platform === 'all') {
                    count = Object.values(news).reduce((sum, arr) => sum + (arr ? arr.length : 0), 0);
                } else {
                    count = (news[platform] || []).length;
                }
                
                const countEl = tab.querySelector('.count');
                if (countEl) countEl.textContent = count;
            });
        }

        function renderNewsList() {
            const container = document.getElementById('newsList');
            const news = appData.news || {};
            
            let items = [];
            if (currentPlatform === 'all') {
                Object.values(news).forEach(arr => {
                    if (arr) items = items.concat(arr);
                });
            } else {
                items = news[currentPlatform] || [];
            }
            
            if (items.length === 0) {
                container.innerHTML = '<div class="empty">暂无数据</div>';
                return;
            }
            
            let html = '';
            items.forEach(item => {
                const platform = item.platform || currentPlatform;
                const emoji = platformEmojis[platform] || '📰';
                
                let coverHtml;
                if (item.cover_url) {
                    coverHtml = '<img src="' + item.cover_url + '" alt="cover" onerror="this.parentElement.innerHTML=\'' + emoji + '\'">';
                } else {
                    coverHtml = emoji;
                }
                
                let statsHtml = '';
                if (item.metrics) {
                    const metrics = item.metrics;
                    if (metrics.search_count) statsHtml += '<span>👁️ ' + metrics.search_count + '</span>';
                    if (metrics.play_count) statsHtml += '<span>▶️ ' + metrics.play_count + '</span>';
                    if (metrics.like_count) statsHtml += '<span>❤️ ' + metrics.like_count + '</span>';
                }
                
                let tagsHtml = '';
                (item.tags || []).forEach(tag => {
                    tagsHtml += '<span class="tag">' + tag + '</span>';
                });
                
                let timeHtml = '';
                if (item.crawl_time) {
                    timeHtml = '<span class="news-time">' + new Date(item.crawl_time).toLocaleString('zh-CN') + '</span>';
                }
                
                let statsDiv = '';
                if (statsHtml) {
                    statsDiv = '<div class="news-stats">' + statsHtml + '</div>';
                }
                
                let tagsDiv = '';
                if (tagsHtml) {
                    tagsDiv = '<div class="news-tags">' + tagsHtml + '</div>';
                }
                
                html += '<a href="' + (item.url || '#') + '" target="_blank" class="news-card" data-platform="' + platform + '">' +
                    '<div class="news-cover">' + coverHtml + '</div>' +
                    '<div class="news-content">' +
                    '<h3 class="news-title">' + (item.title || '无标题') + '</h3>' +
                    '<div class="news-meta">' +
                    '<span class="platform-badge platform-' + platform + '">' + (platformNames[platform] || platform) + '</span>' +
                    timeHtml + statsDiv +
                    '</div>' +
                    tagsDiv +
                    '</div>' +
                    '</a>';
            });
            
            container.innerHTML = html;
        }

        function renderMonitorDashboard() {
            const monitor = appData.monitor || {};
            const summary = monitor.summary || {};
            
            document.getElementById('metricCards').innerHTML = `
                <div class="metric-card">
                    <div class="metric-value success">${summary.total_success_rate || 0}%</div>
                    <div class="metric-label">采集成功率</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value danger">${summary.total_fail_rate || 0}%</div>
                    <div class="metric-label">失败率</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${summary.avg_response_time || 0}s</div>
                    <div class="metric-label">平均响应时间</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value success">${summary.cover_success_rate || 0}%</div>
                    <div class="metric-label">封面获取率</div>
                </div>
            `;
            
            const platforms = monitor.platforms || [];
            document.getElementById('platformStatus').innerHTML = platforms.map(p => `
                <div class="platform-status-card ${p.status}">
                    <span class="status-dot ${p.status}"></span>
                    <div class="platform-status-name">${p.name || p.platform}</div>
                    <div class="platform-status-meta">${p.status === 'online' ? '正常' : '异常'} · ${p.item_count || 0}条</div>
                </div>
            `).join('');
            
            const reasons = monitor.failure_reasons || {};
            const total = Object.values(reasons).reduce((a, b) => a + b, 0) || 1;
            const reasonColors = {
                network_timeout: 'var(--color-error)',
                cookie_expired: 'var(--color-warning)',
                page_changed: 'var(--color-neon-purple)',
                auth_failed: 'var(--color-neon-blue)',
                other: 'var(--color-text-secondary)'
            };
            const reasonLabels = {
                network_timeout: '网络超时',
                cookie_expired: 'Cookie过期',
                page_changed: '页面结构变化',
                auth_failed: '认证失败',
                other: '其他原因'
            };
            
            document.getElementById('failureReasons').innerHTML = Object.entries(reasons).map(([key, count]) => `
                <div class="failure-item">
                    <div class="failure-label">
                        <span class="failure-dot" style="background: ${reasonColors[key]}"></span>
                        ${reasonLabels[key] || key}
                    </div>
                    <div class="failure-bar">
                        <div class="failure-bar-fill" style="width: ${(count / total * 100)}%; background: ${reasonColors[key]}"></div>
                    </div>
                    <span class="failure-count">${count}次</span>
                </div>
            `).join('');
            
            const executions = monitor.recent_executions || [];
            document.getElementById('recentExecutions').innerHTML = executions.map(exec => `
                <div class="record-item ${exec.status}">
                    <div class="record-icon">${exec.status === 'success' ? '✓' : '✕'}</div>
                    <div class="record-content">
                        <div class="record-title">${platformNames[exec.platform] || exec.platform} 热榜采集</div>
                        <div class="record-meta">
                            <span class="record-time">${new Date(exec.timestamp).toLocaleString('zh-CN')}</span>
                            ${exec.status === 'success' 
                                ? `<span class="record-detail">成功获取 ${exec.items_collected || 0} 条 · 耗时 ${exec.latency || 0}s</span>`
                                : `<span class="record-detail error-detail">失败: ${exec.error_message || '未知错误'}</span>`
                            }
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="empty">暂无记录</div>';
        }

        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                
                tab.classList.add('active');
                const pageId = tab.dataset.page + '-page';
                document.getElementById(pageId).classList.add('active');
            });
        });

        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentPlatform = tab.dataset.platform;
                renderNewsList();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadData();
        });

        loadData();
    </script>
</body>
</html>
